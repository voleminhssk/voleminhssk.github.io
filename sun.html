<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Soi Cầu</title>
<style>
body{
    background:linear-gradient(135deg,#000,#111,#000);
    color:gold;
    font-family:Arial;
    text-align:center;
    padding-top:40px;
}
.box{
    width:420px;
    margin:auto;
    background:#111;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 25px gold;
}
input{
    width:80%;
    padding:10px;
    font-size:18px;
    text-align:center;
    border:none;
    border-radius:5px;
}
button{
    margin-top:15px;
    padding:10px 20px;
    font-size:18px;
    background:gold;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.result{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    display:none;
    font-size:20px;
}
.xiu{background:#002200;color:#00ff00;}
.tai{background:#330000;color:#ff4444;}
.neutral{background:#222;color:white;}
#loading{display:none;margin-top:15px;}
.note{margin-top:10px;color:#ccc;font-size:14px;}
</style>
</head>
<body>

<div class="box">
<h2>🤖 AI Soi Cầu</h2>
<input type="text" id="inputData" placeholder="Nhập 124 hoặc 7">
<br>
<button onclick="analyze()">Phân Tích</button>
<div id="loading">Đang tổng hợp và đối chiếu...</div>
<div id="resultBox" class="result"></div>
<div id="noteBox" class="note"></div>
</div>

<script>
function analyze(){

let raw=document.getElementById("inputData").value.trim().replace(/\s/g,'');
let resultBox=document.getElementById("resultBox");
let noteBox=document.getElementById("noteBox");
let loading=document.getElementById("loading");

resultBox.style.display="none";
noteBox.innerHTML="";
loading.style.display="block";

setTimeout(()=>{

loading.style.display="none";

let sum;
let dicePattern=null;

// Nếu nhập 3 số
if(raw.length===3 && /^[1-6]{3}$/.test(raw)){
dicePattern=raw;
sum=parseInt(raw[0])+parseInt(raw[1])+parseInt(raw[2]);
}
// Nếu nhập tổng
else if(!isNaN(raw)){
sum=parseInt(raw);
}
else{
resultBox.innerHTML="Dữ liệu không hợp lệ";
resultBox.className="result neutral";
resultBox.style.display="block";
return;
}

let result="Không có rule cụ thể";
let css="neutral";

// ===== ƯU TIÊN CHECK BỘ ĐẶC BIỆT =====
if(dicePattern){

if(["124","223","133"].includes(dicePattern)){
result="Mẫu đặc biệt → 89% XỈU";
css="xiu";
}
else if(dicePattern==="134"){
result="Mẫu đặc biệt → AUTO XỈU";
css="xiu";
}
else if(["246","156","336","255"].includes(dicePattern)){
result="Mẫu đặc biệt → AUTO XỈU";
css="xiu";
}
else if(["553","661"].includes(dicePattern)){
result="Mẫu đặc biệt → AUTO XỈU";
css="xiu";
}

}

// ===== NẾU KHÔNG TRÙNG BỘ → ÁP DỤNG THEO TỔNG =====
if(css==="neutral"){

switch(sum){

case 3:
case 5:
result="Theo tổng → 100% XỈU";
css="xiu";
break;

case 4:
result="Theo tổng → 68% XỈU";
css="xiu";
break;

case 6:
result="Theo tổng → Nghỉ 1 tay";
break;

case 7:
result="Theo tổng → 89% XỈU";
css="xiu";
break;

case 8:
result="Theo tổng → Còn lại TÀI";
css="tai";
break;

case 9:
result="Theo tổng → 50/50";
break;

case 10:
result="Theo tổng → AUTO XỈU";
css="xiu";
break;

case 11:
result="Theo tổng → Nghỉ";
break;

case 12:
result="Theo tổng → TÀI";
css="tai";
break;

case 13:
result="Theo tổng → TÀI";
css="tai";
break;

case 14:
result="Theo tổng → 50/50";
break;

case 15:
result="Theo tổng → AUTO TÀI";
css="tai";
break;

case 16:
result="Theo tổng → XỈU";
css="xiu";
break;

case 17:
result="Theo tổng → Có thể về 10";
css="tai";
break;

case 18:
result="Theo tổng → TÀI";
css="tai";
break;

default:
result="Tổng ngoài phạm vi 3-18";
}

}

resultBox.innerHTML="Tổng: "+sum+"<br>"+result;
resultBox.className="result "+css;
resultBox.style.display="block";

},1500);
}
</script>

</body>
</html>
