<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar Until Midnight</title>

<style>
body{
  margin:0;
  background:#020617;
  font-family:Segoe UI;
  color:white;
  text-align:center;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:30px;
}

.card{
  background:rgba(10,20,45,0.95);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 40px #00f7ff33;
}

h1{
  color:#00f7ff;
  text-shadow:0 0 15px #00f7ff;
}

.clock{
  font-size:18px;
  margin:10px 0;
  color:#00ffcc;
}

select{
  padding:12px;
  border-radius:12px;
  border:none;
  margin:15px 0;
  font-size:16px;
}

.radar{
  width:280px;
  height:280px;
  margin:30px auto;
  border-radius:50%;
  border:2px solid #00f7ff44;
  position:relative;
  overflow:hidden;
}

.scan{
  position:absolute;
  width:100%;
  height:100%;
  background:conic-gradient(#00f7ff88 0deg,transparent 70deg);
  animation:rotate 2s linear infinite;
}

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.target{
  position:absolute;
  width:12px;
  height:12px;
  background:#00ff88;
  border-radius:50%;
  box-shadow:0 0 15px #00ff88;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.6);}
  100%{transform:scale(1);}
}

.highlight{
  font-size:22px;
  color:#00ff88;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🤖 AI REALTIME SCAN (ĐẾN 23:59)</h1>

<div class="clock" id="clock"></div>

<select id="game" onchange="generateWindow()">
<option>Quyết Chiến</option>
<option>Mạc Chược 1</option>
<option>Mạc Chược 2</option>
<option>Aztec</option>
<option>Wild Đạo Tặc</option>
</select>

<div class="radar" id="radar">
<div class="scan"></div>
</div>

<div id="output"></div>

</div>
</div>

<script>

let currentWindow=null;

function formatTime(date){
  return date.toLocaleTimeString();
}

function minutesOfDay(date){
  return date.getHours()*60 + date.getMinutes();
}

function minutesToTime(min){
  let h=Math.floor(min/60);
  let m=min%60;
  return (h<10?"0"+h:h)+":"+(m<10?"0"+m:m);
}

function seedFromString(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    hash=str.charCodeAt(i)+((hash<<5)-hash);
  }
  return hash;
}

function generateWindow(){

  let now=new Date();
  let currentMin=minutesOfDay(now);
  let endOfDay=23*60+59;

  if(currentMin>=endOfDay){
    currentWindow=null;
    document.getElementById("output").innerHTML=
      "⛔ ĐÃ KẾT THÚC NGÀY HÔM NAY";
    return;
  }

  let game=document.getElementById("game").value;
  let seed=seedFromString(game+navigator.userAgent+currentMin);

  let bestScore=0;
  let bestStart=currentMin;
  let bestEnd=currentMin+5;

  // chỉ quét tới 23:59
  for(let i=0;i<80;i++){

    let rand=Math.abs(Math.sin(seed+i))*10000;
    rand=rand-Math.floor(rand);

    let maxRange=endOfDay-currentMin;
    if(maxRange<=0) break;

    let start=currentMin + Math.floor(rand*maxRange);
    let duration=5 + Math.floor(rand*25);
    let end=start+duration;

    if(end>endOfDay) end=endOfDay;

    let score=Math.floor(rand*100);

    if(score>bestScore && start>=currentMin){
      bestScore=score;
      bestStart=start;
      bestEnd=end;
    }
  }

  currentWindow={
    start:bestStart,
    end:bestEnd,
    score:bestScore
  };

  placeTarget();
}

function placeTarget(){
  let radar=document.getElementById("radar");
  let old=document.querySelector(".target");
  if(old) old.remove();

  let dot=document.createElement("div");
  dot.className="target";

  let angle=Math.random()*360;
  let radius=90*Math.random();

  let x=140 + radius*Math.cos(angle*Math.PI/180);
  let y=140 + radius*Math.sin(angle*Math.PI/180);

  dot.style.left=x+"px";
  dot.style.top=y+"px";

  radar.appendChild(dot);
}

function update(){

  let now=new Date();
  document.getElementById("clock").innerHTML=
    "🕒 Thời gian hiện tại: "+formatTime(now);

  if(!currentWindow){
    generateWindow();
  }

  if(currentWindow){

    let currentMin=minutesOfDay(now);

    if(currentMin>=currentWindow.end){
      generateWindow();
    }

    let minsToStart=currentWindow.start-currentMin;
    let minsToEnd=currentWindow.end-currentMin;

    if(minsToStart<0) minsToStart=0;
    if(minsToEnd<0) minsToEnd=0;

    document.getElementById("output").innerHTML=`
      🔥 KHUNG GIỜ PHÁT HIỆN:<br><br>
      <div class="highlight">
      ${minutesToTime(currentWindow.start)} - ${minutesToTime(currentWindow.end)}
      </div><br>
      📊 Điểm AI: ${currentWindow.score}%<br><br>
      ⏳ Còn ${minsToStart} phút tới bắt đầu<br>
      ⏳ Còn ${minsToEnd} phút tới kết thúc
    `;
  }
}

generateWindow();
setInterval(update,1000);

</script>

</body>
</html>
