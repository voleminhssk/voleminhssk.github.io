<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Auto Scan Pro</title>

<style>
body{
  margin:0;
  background:#040914;
  font-family:Segoe UI;
  color:white;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}

.card{
  background:rgba(10,18,40,0.95);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 40px #00f7ff33;
}

h1{
  color:#00f7ff;
  text-shadow:0 0 15px #00f7ff;
}

select{
  padding:12px;
  margin:10px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

/* RADAR */

.radar{
  width:280px;
  height:280px;
  margin:30px auto;
  border-radius:50%;
  border:2px solid #00f7ff44;
  position:relative;
  overflow:hidden;
}

.scan{
  position:absolute;
  width:100%;
  height:100%;
  background:conic-gradient(#00f7ff99 0deg,transparent 70deg);
  animation:rotate 2s linear infinite;
}

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.target{
  position:absolute;
  width:12px;
  height:12px;
  background:#00ff88;
  border-radius:50%;
  box-shadow:0 0 15px #00ff88;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.6);}
  100%{transform:scale(1);}
}

.highlight{
  font-size:24px;
  color:#00ff88;
}

.small{
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🤖 AI AUTO RADAR SCAN</h1>

<select id="game">
<option>Quyết Chiến</option>
<option>Mạc Chược 1</option>
<option>Mạc Chược 2</option>
<option>Aztec</option>
<option>Wild Đạo Tặc</option>
</select>

<div class="radar" id="radar">
<div class="scan"></div>
</div>

<div id="output"></div>

</div>
</div>

<script>

let currentWindow=null;

function minutesToTime(min){
  let h=Math.floor(min/60)%24;
  let m=min%60;
  return (h<10?"0"+h:h)+":"+(m<10?"0"+m:m);
}

function seedFromString(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    hash=str.charCodeAt(i)+((hash<<5)-hash);
  }
  return hash;
}

function generateNewWindow(){

  let game=document.getElementById("game").value;
  let userAgent=navigator.userAgent;
  let seed=seedFromString(userAgent+game);

  let now=new Date();
  let currentMin=now.getHours()*60+now.getMinutes();

  let bestScore=0;
  let bestStart=0;
  let bestEnd=0;

  for(let i=0;i<50;i++){

    let rand=Math.abs(Math.sin(seed+i))*10000;
    rand=rand-Math.floor(rand);

    // quét 0 -> 12h tới
    let start=currentMin+Math.floor(rand*720);
    let duration=10+Math.floor(rand*40);
    let end=start+duration;

    let score=Math.floor(rand*100);

    if(score>bestScore){
      bestScore=score;
      bestStart=start;
      bestEnd=end;
    }
  }

  currentWindow={
    start:bestStart,
    end:bestEnd,
    score:bestScore
  };

  placeTarget();
}

function placeTarget(){
  let radar=document.getElementById("radar");
  let old=document.querySelector(".target");
  if(old) old.remove();

  let dot=document.createElement("div");
  dot.className="target";

  let angle=Math.random()*360;
  let radius=90*Math.random();

  let x=140 + radius*Math.cos(angle*Math.PI/180);
  let y=140 + radius*Math.sin(angle*Math.PI/180);

  dot.style.left=x+"px";
  dot.style.top=y+"px";

  radar.appendChild(dot);
}

function updateDisplay(){

  if(!currentWindow){
    generateNewWindow();
  }

  let now=new Date();
  let currentMin=now.getHours()*60+now.getMinutes();

  if(currentMin>currentWindow.end){
    generateNewWindow();
  }

  let minsToStart=currentWindow.start-currentMin;
  let minsToEnd=currentWindow.end-currentMin;

  if(minsToStart<0) minsToStart=0;
  if(minsToEnd<0) minsToEnd=0;

  document.getElementById("output").innerHTML=`
    🔥 KHUNG GIỜ ĐƯỢC PHÁT HIỆN:<br><br>
    <div class="highlight">
    ${minutesToTime(currentWindow.start)} - ${minutesToTime(currentWindow.end)}
    </div><br>
    📊 Điểm AI: ${currentWindow.score}%<br><br>
    ⏳ Bắt đầu sau: ${minsToStart} phút<br>
    ⏳ Kết thúc sau: ${minsToEnd} phút<br>
    <div class="small">
    ⚠️ Khi khung kết thúc, AI sẽ tự động quét khung mới
    </div>
  `;
}

generateNewWindow();
setInterval(updateDisplay,10000);

</script>

</body>
</html>
