<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Phân Tích Khung Giờ</title>

<style>
body{
  margin:0;
  background:#0b0f1d;
  font-family:Segoe UI;
  color:white;
  text-align:center;
}
.container{
  max-width:850px;
  margin:auto;
  padding:30px;
}
.card{
  background:rgba(18,22,45,0.95);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 35px #00f7ff33;
}
h1{
  color:#00f7ff;
  text-shadow:0 0 15px #00f7ff;
}
button{
  padding:14px 25px;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#00f7ff;
  font-weight:bold;
  cursor:pointer;
}
.progress{
  width:100%;
  height:20px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  margin-top:25px;
}
.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00f7ff,#00ff88);
}
.result{
  margin-top:30px;
}
.highlight{
  font-size:26px;
  color:#00ff88;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🤖 AI PHÂN TÍCH KHUNG GIỜ ĐẸP NHẤT</h1>

<button onclick="runAI()">Phân Tích Theo Ngày</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="output" class="result"></div>

</div>
</div>

<script>

function minutesToTime(min){
  let h=Math.floor(min/60)%24;
  let m=min%60;
  return (h<10?"0"+h:h)+":"+(m<10?"0"+m:m);
}

function countdownTo(startMin){
  let now=new Date();
  let current=now.getHours()*60+now.getMinutes();
  let diff=startMin-current;
  return diff+" phút";
}

function getDailySeed(){
  let d=new Date();
  return d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
}

function seededRandom(seed){
  let x = Math.sin(seed++) * 10000;
  return x - Math.floor(x);
}

function runAI(){

  let bar=document.getElementById("bar");
  bar.style.width="0%";
  document.getElementById("output").innerHTML=
  "🔍 AI đang phân tích theo ngày & giờ hiện tại...";

  let progress=0;
  let interval=setInterval(()=>{
    progress+=5;
    bar.style.width=progress+"%";
    if(progress>=100){
      clearInterval(interval);
      generateResult();
    }
  },100);

  function generateResult(){

    let now=new Date();
    let currentMin=now.getHours()*60+now.getMinutes();

    let dailySeed=getDailySeed();
    let bestScore=0;
    let bestStart=0;
    let bestEnd=0;

    for(let i=0;i<40;i++){

      // Chỉ lấy khung sắp tới trong 12 giờ tới
      let start=currentMin+5+Math.floor(Math.random()*720);
      let duration=10+Math.floor(Math.random()*30);
      let end=start+duration;

      // RNG theo ngày
      let dailyFactor=seededRandom(dailySeed+i)*100;

      // Độ gần hiện tại
      let proximity=100-(start-currentMin)/8;

      // Điểm tổng hợp
      let score=(dailyFactor*0.5)+(proximity*0.5);

      score=Math.floor(Math.min(98,score));

      if(score>bestScore){
        bestScore=score;
        bestStart=start;
        bestEnd=end;
      }
    }

    document.getElementById("output").innerHTML=`
      📅 Ngày: ${now.toLocaleDateString()}<br><br>
      🔥 KHUNG GIỜ ĐẸP NHẤT SẮP TỚI:<br>
      <div class="highlight">
      ${minutesToTime(bestStart)} - ${minutesToTime(bestEnd)}
      </div><br>
      📊 Độ thuận lợi: <b>${bestScore}%</b><br>
      ⏳ Còn ${countdownTo(bestStart)} nữa
    `;
  }

}

</script>

</body>
</html>
