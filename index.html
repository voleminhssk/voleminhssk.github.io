<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pro</title>

<style>
body{
  margin:0;
  background:#040914;
  font-family:Segoe UI;
  color:white;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}

.card{
  background:rgba(10,18,40,0.95);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 40px #00f7ff33;
}

h1{
  color:#00f7ff;
  text-shadow:0 0 15px #00f7ff;
}

select,button{
  padding:12px;
  margin:10px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

button{
  background:#00f7ff;
  font-weight:bold;
  cursor:pointer;
}

/* RADAR */

.radar{
  width:280px;
  height:280px;
  margin:30px auto;
  border-radius:50%;
  border:2px solid #00f7ff44;
  position:relative;
  overflow:hidden;
}

.radar::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle,#00ff8844 1%,transparent 65%);
}

.scan{
  position:absolute;
  width:100%;
  height:100%;
  background:conic-gradient(#00f7ff99 0deg,transparent 70deg);
  animation:rotate 2s linear infinite;
}

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* Target dot */

.target{
  position:absolute;
  width:12px;
  height:12px;
  background:#00ff88;
  border-radius:50%;
  box-shadow:0 0 15px #00ff88;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.6);}
  100%{transform:scale(1);}
}

.result{
  margin-top:20px;
}

.highlight{
  font-size:24px;
  color:#00ff88;
}

.small{
  font-size:13px;
  opacity:0.8;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🤖 AI RADAR TARGET SCAN</h1>

<select id="game">
<option>Quyết Chiến</option>
<option>Mạc Chược 1</option>
<option>Mạc Chược 2</option>
<option>Aztec</option>
<option>Wild Đạo Tặc</option>
</select>

<div class="radar" id="radar">
<div class="scan"></div>
</div>

<button onclick="runAI()">Bắt Đầu Quét</button>

<div id="output" class="result"></div>

</div>
</div>

<script>

function minutesToTime(min){
  let h=Math.floor(min/60)%24;
  let m=min%60;
  return (h<10?"0"+h:h)+":"+(m<10?"0"+m:m);
}

function seedFromString(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    hash=str.charCodeAt(i)+((hash<<5)-hash);
  }
  return hash;
}

function runAI(){

  let game=document.getElementById("game").value;
  let radar=document.getElementById("radar");

  // Xoá target cũ
  let oldTarget=document.querySelector(".target");
  if(oldTarget) oldTarget.remove();

  document.getElementById("output").innerHTML=
  "🔍 AI đang quét khung giờ từ thời điểm hiện tại...";

  let userAgent=navigator.userAgent;
  let seed=seedFromString(userAgent + game);

  let now=new Date();
  let currentMin=now.getHours()*60+now.getMinutes();

  let bestScore=0;
  let bestStart=0;
  let bestEnd=0;

  for(let i=0;i<30;i++){

    let rand=Math.abs(Math.sin(seed+i))*10000;
    rand=rand-Math.floor(rand);

    // CHỈ từ thời gian hiện tại trở đi (0 -> 8h tới)
    let start=currentMin+Math.floor(rand*480);
    let duration=10+Math.floor(rand*25);
    let end=start+duration;

    let score=Math.floor(rand*100);

    if(score>bestScore){
      bestScore=score;
      bestStart=start;
      bestEnd=end;
    }
  }

  // Tạo chấm target ngẫu nhiên trong radar
  let target=document.createElement("div");
  target.className="target";

  let angle=Math.random()*360;
  let radius=100*Math.random();

  let x=140 + radius*Math.cos(angle*Math.PI/180);
  let y=140 + radius*Math.sin(angle*Math.PI/180);

  target.style.left=x+"px";
  target.style.top=y+"px";

  radar.appendChild(target);

  document.getElementById("output").innerHTML=`
    🎮 Game: ${game}<br><br>
    🔥 KHUNG GIỜ PHÁT HIỆN (từ hiện tại trở đi):<br>
    <div class="highlight">
    ${minutesToTime(bestStart)} - ${minutesToTime(bestEnd)}
    </div><br>
    📊 Điểm AI: ${bestScore}%<br>
    <div class="small">
    ⚠️ Mỗi thiết bị & game sẽ có kết quả khác nhau
    </div>
  `;
}

</script>

</body>
</html>
