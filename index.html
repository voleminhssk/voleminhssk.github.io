<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Phân Tích Casino</title>

<style>
body{
  margin:0;
  background:#0c0f1f;
  font-family:Segoe UI;
  color:white;
  text-align:center;
}
.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}
.card{
  background:rgba(20,25,50,0.95);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 40px #00f7ff33;
}
h1{
  color:#00f7ff;
  text-shadow:0 0 15px #00f7ff;
}
select,button{
  padding:12px;
  margin:10px;
  border-radius:12px;
  border:none;
  font-size:16px;
}
button{
  background:#00f7ff;
  font-weight:bold;
  cursor:pointer;
}
.progress{
  width:100%;
  height:20px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  margin-top:20px;
}
.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00f7ff,#00ff88);
}
.result{
  margin-top:25px;
  font-size:18px;
}
.box{
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  background:#111633;
  box-shadow:0 0 15px #00ff8855;
}
.highlight{
  font-size:22px;
  color:#00ff88;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🤖 AI CASINO PRO</h1>

<select id="game">
<option>Quyết Chiến</option>
<option>Mạc Chược 1</option>
<option>Mạc Chược 2</option>
</select>

<br>
<button onclick="runAI()">Phân Tích AI</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="output" class="result"></div>

</div>
</div>

<script>

function minutesToTime(min){
  let h=Math.floor(min/60)%24;
  let m=min%60;
  return (h<10?"0"+h:h)+":"+(m<10?"0"+m:m);
}

function countdownTo(startMin){
  let now=new Date();
  let current=now.getHours()*60+now.getMinutes();
  let diff=startMin-current;
  if(diff<0) diff+=1440;
  return diff+" phút";
}

function runAI(){

  let game=document.getElementById("game").value;

  document.getElementById("output").innerHTML=
  "🔍 AI đang phân tích "+game+"...";

  let bar=document.getElementById("bar");
  bar.style.width="0%";

  let progress=0;
  let interval=setInterval(()=>{
    progress+=4;
    bar.style.width=progress+"%";
    if(progress>=100){
      clearInterval(interval);
      generateResult();
    }
  },100);

  function generateResult(){

    let now=new Date();
    let currentMin=now.getHours()*60+now.getMinutes();

    let results=[];

    for(let i=0;i<30;i++){

      let range=720;
      let start=currentMin+Math.floor(Math.random()*range);
      let duration=10+Math.floor(Math.random()*35);
      let end=start+duration;

      let volatility=Math.random()*100;
      let proximity=Math.max(0,100-Math.abs(start-currentMin)/4);

      let weightGame=0;

      if(game==="Quyết Chiến") weightGame=0.7;
      if(game==="Mạc Chược 1") weightGame=0.6;
      if(game==="Mạc Chược 2") weightGame=0.65;

      let score=Math.floor(
        (volatility*weightGame)+(proximity*(1-weightGame))
      );

      score=Math.min(97,score);

      results.push({
        start:start,
        end:end,
        score:score
      });
    }

    results.sort((a,b)=>b.score-a.score);

    let best1=results[0];
    let best2=results[1];

    document.getElementById("output").innerHTML=`
      🎮 Game: <b>${game}</b><br><br>

      <div class="box">
        🥇 KHUNG MẠNH NHẤT<br>
        <div class="highlight">
        ${minutesToTime(best1.start)} - ${minutesToTime(best1.end)}
        </div>
        📊 ${best1.score}%<br>
        ⏳ Còn ${countdownTo(best1.start)}
      </div>

      <div class="box">
        🥈 KHUNG THỨ 2<br>
        <div class="highlight">
        ${minutesToTime(best2.start)} - ${minutesToTime(best2.end)}
        </div>
        📊 ${best2.score}%<br>
        ⏳ Còn ${countdownTo(best2.start)}
      </div>
    `;
  }

}

</script>

</body>
</html>
