<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theo Dõi Khung Giờ Nâng Cấp</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:20px;
  transition:background 0.5s ease;
}
h1{text-align:center;color:gold;}
.now{text-align:center;font-size:20px;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #555;padding:10px;text-align:center;}
.match{background:#2ecc71;color:#000;font-weight:bold;}
.wait{background:#e74c3c;}
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#000;
  padding:30px;
  border:3px solid gold;
  font-size:22px;
  text-align:center;
  display:none;
  z-index:9999;
  box-shadow:0 0 30px gold;
}
</style>
</head>
<body>

<h1>🔥 Theo Dõi Khung Giờ Tự Động 🔥</h1>

<div class="now">
⏰ Giờ hiện tại: <span id="currentTime"></span>
</div>

<table>
<tr>
<th>Khung giờ</th>
<th>Trạng thái</th>
<th>Thời gian</th>
</tr>
<tbody id="tableBody"></tbody>
</table>

<div class="popup" id="popup"></div>

<script>

const timeSlots = [
  {start:"00:00", end:"03:00"},
  {start:"10:00", end:"11:00"},
  {start:"11:00", end:"13:30"},
  {start:"20:00", end:"23:00"}
];

let activeIndex = -1;
let firstLoad = true;

function toMinutes(t){
  const [h,m] = t.split(":").map(Number);
  return h*60+m;
}

function pad(n){return n<10?"0"+n:n;}

function showPopup(text){
  const popup=document.getElementById("popup");
  popup.innerText=text;
  popup.style.display="block";
  setTimeout(()=>popup.style.display="none",4000);
}

function update(){

  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const nowSec=now.getSeconds();

  document.getElementById("currentTime").innerText=
    pad(now.getHours())+":"+
    pad(now.getMinutes())+":"+
    pad(now.getSeconds());

  let slotData=[];

  timeSlots.forEach((slot,index)=>{

    let start=toMinutes(slot.start);
    let end=toMinutes(slot.end);

    let diff=start-nowMin;
    if(diff<0) diff+=1440;

    let inSlot = (nowMin>=start && nowMin<end);

    slotData.push({
      index,
      start,
      end,
      diff,
      inSlot,
      raw:slot
    });
  });

  // ===== SẮP XẾP THEO GẦN NHẤT =====
  slotData.sort((a,b)=>a.diff-b.diff);

  let html="";
  let found=false;

  slotData.forEach(data=>{

    let status="";
    let detail="";

    if(data.inSlot){

      let remainMin=data.end-nowMin-1;
      let remainSec=60-nowSec;
      if(remainSec===60) remainSec=0;

      status="ĐANG TRONG KHUNG";
      detail=remainMin+" phút "+remainSec+" giây";
      found=true;

      if(activeIndex!==data.index){
        showPopup("🔥 BẮT ĐẦU KHUNG GIỜ 🔥");
      }

      activeIndex=data.index;

    }else{

      if(activeIndex===data.index){
        showPopup("⛔ KHUNG GIỜ ĐÃ KẾT THÚC ⛔");
        activeIndex=-1;
      }

      status="SẮP TỚI";
      detail="Còn "+data.diff+" phút";
    }

    html+=`
      <tr>
        <td>${data.raw.start} - ${data.raw.end}</td>
        <td class="${data.inSlot?'match':'wait'}">${status}</td>
        <td>${detail}</td>
      </tr>
    `;
  });

  document.getElementById("tableBody").innerHTML=html;

  // ===== POPUP KHI VỪA MỞ WEB =====
  if(firstLoad){
    if(found){
      showPopup("🔥 ĐANG TRONG KHUNG GIỜ 🔥");
      document.body.style.background="#145a32";
    }else{
      showPopup("⏳ SẮP TỚI SAU "+slotData[0].diff+" PHÚT");
      document.body.style.background="#641e16";
    }
    firstLoad=false;
  }

  // ===== ĐỔI NỀN =====
  if(found){
    document.body.style.background="#145a32";
  }else{
    document.body.style.background="#111";
  }
}

setInterval(update,1000);
update();

</script>

</body>
</html>
