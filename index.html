<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar Scan</title>

<style>
body{
  margin:0;
  background:#050a18;
  font-family:Segoe UI;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}

.card{
  background:rgba(10,15,35,0.95);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 40px #00f7ff44;
}

h1{
  color:#00f7ff;
  text-shadow:0 0 15px #00f7ff;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#00f7ff;
  font-weight:bold;
  cursor:pointer;
}

/* RADAR */

.radar{
  width:250px;
  height:250px;
  margin:30px auto;
  border-radius:50%;
  border:2px solid #00f7ff55;
  position:relative;
  overflow:hidden;
}

.radar::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle,#00ff8855 1%,transparent 60%);
}

.scan{
  position:absolute;
  width:100%;
  height:100%;
  background:conic-gradient(#00f7ff88 0deg,transparent 60deg);
  animation:rotate 2s linear infinite;
}

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.result{
  margin-top:20px;
}

.highlight{
  font-size:24px;
  color:#00ff88;
}
.small{
  font-size:13px;
  opacity:0.8;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🤖 AI RADAR PHÂN TÍCH</h1>

<div class="radar">
<div class="scan"></div>
</div>

<button onclick="runAI()">Bắt Đầu Phân Tích</button>

<div id="deviceInfo" class="small"></div>
<div id="output" class="result"></div>

</div>
</div>

<script>

function minutesToTime(min){
  let h=Math.floor(min/60)%24;
  let m=min%60;
  return (h<10?"0"+h:h)+":"+(m<10?"0"+m:m);
}

function seedFromString(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    hash=str.charCodeAt(i)+((hash<<5)-hash);
  }
  return hash;
}

function runAI(){

  document.getElementById("output").innerHTML=
  "🔍 AI đang quét thiết bị và phân tích...";

  let userAgent=navigator.userAgent;
  let seed=seedFromString(userAgent);

  let now=new Date();
  let currentMin=now.getHours()*60+now.getMinutes();

  let bestScore=0;
  let bestStart=0;
  let bestEnd=0;

  for(let i=0;i<40;i++){

    let rand=Math.abs(Math.sin(seed+i))*10000;
    rand=rand-Math.floor(rand);

    let start=currentMin+5+Math.floor(rand*600);
    let duration=10+Math.floor(rand*30);
    let end=start+duration;

    let score=Math.floor(rand*100);

    if(score>bestScore){
      bestScore=score;
      bestStart=start;
      bestEnd=end;
    }
  }

  document.getElementById("output").innerHTML=`
    🔥 KHUNG GIỜ RIÊNG CHO THIẾT BỊ NÀY:<br><br>
    <div class="highlight">
    ${minutesToTime(bestStart)} - ${minutesToTime(bestEnd)}
    </div><br>
    📊 Điểm AI: ${bestScore}%<br>
    <div class="small">
    ⚠️ Mỗi thiết bị sẽ có khung giờ khác nhau
    </div>
  `;

}

/* Lấy IP nếu có internet */

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>{
  document.getElementById("deviceInfo").innerHTML=
  "🌐 IP: "+data.ip+"<br>📱 Thiết bị: "+navigator.userAgent;
})
.catch(()=>{
  document.getElementById("deviceInfo").innerHTML=
  "📱 Thiết bị: "+navigator.userAgent;
});

</script>

</body>
</html>
