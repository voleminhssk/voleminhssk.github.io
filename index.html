<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BOT PHÂN TÍCH KHUNG GIỜ THEO NGÀY</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    margin-top: 40px;
}

input {
    padding: 10px;
    margin: 10px;
    width: 220px;
    background: #1e293b;
    border: none;
    color: white;
}

button {
    padding: 12px 25px;
    background: orange;
    border: none;
    cursor: pointer;
}

.day-box {
    background: #1e293b;
    margin: 15px auto;
    padding: 15px;
    width: 300px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🤖 BOT PHÂN TÍCH KHUNG GIỜ THEO NGÀY</h1>

    <input type="number" id="nap" placeholder="Tổng tiền nạp">
    <input type="number" id="cuoc" placeholder="Tổng tiền cược">
    <br>
    <button onclick="analyze()">🚀 Phân tích</button>

    <div id="result"></div>
</div>

<script>
function getBestHour(ratio, isWeekend) {
    let bestHour = "";
    let bestScore = -999;

    for (let i = 0; i < 24; i++) {
        let score = 0;

        // 🔥 giờ đêm (xả mạnh)
        if (i >= 1 && i <= 5) score += isWeekend ? 2 : 3;

        // 🔥 giờ chuyển
        if ((i >= 9 && i <= 11) || (i >= 14 && i <= 16)) score += 2;

        // 🔥 giờ tối (hút)
        if (i >= 19 && i <= 23) score -= isWeekend ? 4 : 3;

        // 🔥 ratio
        if (ratio > 1.5) score += 2;
        if (ratio > 2) score += 1;
        if (ratio < 1) score -= 2;

        if (score > bestScore) {
            bestScore = score;
            bestHour = i + "h";
        }
    }

    return {hour: bestHour, score: bestScore};
}

function analyze() {
    let nap = parseFloat(document.getElementById("nap").value);
    let cuoc = parseFloat(document.getElementById("cuoc").value);

    if (!nap || !cuoc) {
        alert("Nhập đủ dữ liệu!");
        return;
    }

    let ratio = cuoc / nap;

    let days = [
        "Thứ 2","Thứ 3","Thứ 4","Thứ 5",
        "Thứ 6","Thứ 7","Chủ nhật"
    ];

    let html = "";

    days.forEach((day, index) => {
        let isWeekend = (index >= 4); // T6-CN

        let result = getBestHour(ratio, isWeekend);

        html += `
        <div class="day-box">
            <h3>${day}</h3>
            🔥 Giờ đẹp: ${result.hour} <br>
            ⚡ Điểm: ${result.score}
        </div>
        `;
    });

    document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
