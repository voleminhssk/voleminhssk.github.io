<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SHA256 Tài Xỉu AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
body{
    background: radial-gradient(circle at top,#1a1a1a,#000);
    color:#ffd700;
    font-family: Arial;
    text-align:center;
}
h2{
    text-shadow:0 0 15px #ffd700;
}
input{
    padding:14px;
    width:420px;
    border-radius:12px;
    border:none;
}
button{
    padding:12px 30px;
    border-radius:12px;
    border:none;
    background:linear-gradient(45deg,#ffd700,#ffae00);
    font-weight:bold;
    cursor:pointer;
}
.card{
    margin:30px auto;
    padding:25px;
    width:450px;
    background:#111;
    border-radius:15px;
    box-shadow:0 0 25px #ffd70055;
    display:none;
}
.loading{
    margin-top:20px;
    display:none;
}
</style>
</head>
<body>

<h2>🔐 SHA256 AI DỰ ĐOÁN TÀI XỈU 🔥</h2>

<input type="text" id="hashInput" placeholder="Nhập SHA256 hash...">
<br><br>
<button onclick="analyze()">Phân Tích</button>

<div class="loading" id="loading">⚡ AI đang phân tích SHA256...</div>
<div class="card" id="resultCard"></div>

<script>

function sha256ToDice(hash){

    // Lấy 6 ký tự đầu
    let part1 = hash.substring(0,2);
    let part2 = hash.substring(2,4);
    let part3 = hash.substring(4,6);

    let dice1 = (parseInt(part1,16) % 6) + 1;
    let dice2 = (parseInt(part2,16) % 6) + 1;
    let dice3 = (parseInt(part3,16) % 6) + 1;

    return [dice1,dice2,dice3];
}

function analyze(){

    let input = document.getElementById("hashInput").value.trim().toLowerCase();
    let loading = document.getElementById("loading");
    let card = document.getElementById("resultCard");

    if(input.length !== 64){
        alert("Hash SHA256 phải đủ 64 ký tự!");
        return;
    }

    card.style.display="none";
    loading.style.display="block";

    setTimeout(()=>{

        loading.style.display="none";

        let dice = sha256ToDice(input);
        let total = dice[0] + dice[1] + dice[2];
        let result = total >= 11 ? "TÀI 🔥" : "XỈU ❄";

        // Độ nghiêng xác suất mô phỏng
        let confidence = ((parseInt(input.substring(0,8),16) % 30) + 70);

        card.innerHTML = `
            🎲 Xúc xắc AI: <b>${dice[0]} - ${dice[1]} - ${dice[2]}</b><br><br>
            🔢 Tổng: <b>${total}</b><br><br>
            🔥 Dự đoán: <b>${result}</b><br><br>
            📊 Độ tin cậy AI: <b>${confidence}%</b>
        `;

        card.style.display="block";

    },1200);
}

</script>

</body>
</html>
