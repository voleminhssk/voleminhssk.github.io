<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>MD5 Flexible AI Tài Xỉu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
body{
    background: radial-gradient(circle at top,#1a1a1a,#000);
    color:#ffd700;
    font-family: Arial;
    text-align:center;
}
h2{
    text-shadow:0 0 15px #ffd700;
}
input{
    padding:14px;
    width:420px;
    border-radius:12px;
    border:none;
}
button{
    padding:12px 30px;
    border-radius:12px;
    border:none;
    background:linear-gradient(45deg,#ffd700,#ffae00);
    font-weight:bold;
    cursor:pointer;
}
.card{
    margin:30px auto;
    padding:25px;
    width:450px;
    background:#111;
    border-radius:15px;
    box-shadow:0 0 25px #ffd70055;
    display:none;
}
.loading{
    margin-top:20px;
    display:none;
}
</style>
</head>
<body>

<h2>🔥 MD5 AI FLEXIBLE PREDICT 🔥</h2>

<input type="text" id="hashInput" placeholder="Nhập bất kỳ chuỗi / md5...">
<br><br>
<button onclick="analyze()">Phân Tích</button>

<div class="loading" id="loading">⚡ AI đang chuẩn hóa dữ liệu...</div>
<div class="card" id="resultCard"></div>

<script>

function isValidMD5(str){
    return /^[a-f0-9]{32}$/i.test(str);
}

function generateDiceFromHash(hash){

    let part1 = hash.substring(0,2);
    let part2 = hash.substring(2,4);
    let part3 = hash.substring(4,6);

    let dice1 = (parseInt(part1,16) % 6) + 1;
    let dice2 = (parseInt(part2,16) % 6) + 1;
    let dice3 = (parseInt(part3,16) % 6) + 1;

    return [dice1,dice2,dice3];
}

function analyze(){

    let input = document.getElementById("hashInput").value.trim();
    let loading = document.getElementById("loading");
    let card = document.getElementById("resultCard");

    if(input.length === 0){
        alert("Vui lòng nhập dữ liệu!");
        return;
    }

    card.style.display="none";
    loading.style.display="block";

    setTimeout(()=>{

        let finalHash;

        if(isValidMD5(input)){
            finalHash = input.toLowerCase();
        }else{
            // Tự hash lại nếu không phải MD5 chuẩn
            finalHash = CryptoJS.MD5(input).toString();
        }

        let dice = generateDiceFromHash(finalHash);
        let total = dice[0] + dice[1] + dice[2];
        let result = total >= 11 ? "TÀI 🔥" : "XỈU ❄";

        let confidence = ((parseInt(finalHash.substring(0,8),16) % 25) + 75);

        loading.style.display="none";

        card.innerHTML = `
            🔐 MD5 sử dụng: <br><b>${finalHash}</b><br><br>
            🎲 Xúc xắc AI: <b>${dice[0]} - ${dice[1]} - ${dice[2]}</b><br><br>
            🔢 Tổng: <b>${total}</b><br><br>
            🔥 Dự đoán: <b>${result}</b><br><br>
            📊 Độ tin cậy AI: <b>${confidence}%</b>
        `;

        card.style.display="block";

    },1000);
}

</script>

</body>
</html>
