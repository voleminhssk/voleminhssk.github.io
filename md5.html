<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PRO HASH SICBO AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
body{
    background: radial-gradient(circle at top,#1a1a1a,#000);
    font-family: Arial;
    color:#ffd700;
    text-align:center;
}
.container{
    margin-top:50px;
}
input{
    padding:12px;
    width:350px;
    border-radius:10px;
    border:none;
    font-size:16px;
}
button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#ffd700,#ffae00);
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
}
button:hover{
    box-shadow:0 0 15px #ffd700;
}
.card{
    margin:30px auto;
    padding:25px;
    width:400px;
    background:#111;
    border-radius:15px;
    box-shadow:0 0 20px #ffd70055;
    display:none;
}
.loading{
    display:none;
    font-size:18px;
}
.glow{
    text-shadow:0 0 10px #ffd700;
}
</style>
</head>
<body>

<div class="container">

<h2 class="glow">🔥 PRO HASH TÀI XỈU AI 🔥</h2>

<input type="text" id="hashInput" placeholder="Nhập hash bất kỳ...">
<br>
<button onclick="analyze()">AI Phân Tích</button>

<div class="loading" id="loading">
⚡ AI đang phân tích dữ liệu...
</div>

<div class="card" id="resultCard"></div>

</div>

<script>

function generateHashes(){
    let map = {};
    const hashTypes = ["MD5","SHA1","SHA256","SHA512","SHA3","RIPEMD160"];

    for(let i=1;i<=6;i++){
        for(let j=1;j<=6;j++){
            for(let k=1;k<=6;k++){

                let str = i+"-"+j+"-"+k;
                let total = i+j+k;
                let type = total>=11 ? "TÀI 🔥" : "XỈU ❄";

                hashTypes.forEach(ht=>{
                    let hash;
                    switch(ht){
                        case "MD5": hash = CryptoJS.MD5(str).toString(); break;
                        case "SHA1": hash = CryptoJS.SHA1(str).toString(); break;
                        case "SHA256": hash = CryptoJS.SHA256(str).toString(); break;
                        case "SHA512": hash = CryptoJS.SHA512(str).toString(); break;
                        case "SHA3": hash = CryptoJS.SHA3(str).toString(); break;
                        case "RIPEMD160": hash = CryptoJS.RIPEMD160(str).toString(); break;
                    }

                    map[hash] = {
                        dice:str,
                        total:total,
                        result:type,
                        algo:ht
                    };
                });

            }
        }
    }

    return map;
}

const hashMap = generateHashes();

function analyze(){
    let input = document.getElementById("hashInput").value.trim().toLowerCase();
    let loading = document.getElementById("loading");
    let card = document.getElementById("resultCard");

    card.style.display="none";
    loading.style.display="block";

    setTimeout(()=>{

        loading.style.display="none";

        if(hashMap[input]){
            let data = hashMap[input];

            let probability = (Math.random()*10+45).toFixed(2);

            card.innerHTML = `
                🎲 Xúc xắc: <b>${data.dice}</b><br><br>
                🔢 Tổng: <b>${data.total}</b><br><br>
                🔥 Kết quả: <b>${data.result}</b><br><br>
                🧪 Thuật toán hash: <b>${data.algo}</b><br><br>
                📊 Độ tin cậy AI: <b>${probability}%</b>
            `;
            card.style.display="block";
        }else{
            card.innerHTML = "❌ Không tìm thấy hash trong hệ thống!";
            card.style.display="block";
        }

    },1500);
}

</script>

</body>
</html>
