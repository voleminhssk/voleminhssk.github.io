body{

.xiu{

.equal{

@keyframes fadeIn{

    to{opacity:1;transform:translateY(0);}
}

/* =====  HÀM PHÂN TÍCH CHUỖI ===== */
function analyze(){

    const loading=document.getElementById("loadingGif");
    const resultBox=document.getElementById("resultBox");
    const input=document.getElementById("searchInput").value.trim();

    if(!input){
        alert("Vui lòng nhập chuỗi số!");
        return;
    }

    let search = input.split(',')
        .map(x=>parseInt(x.trim()))
        .filter(x=>!isNaN(x));

    if(search.length===0){
        alert("Chuỗi không hợp lệ!");
        return;
    }

    loading.style.display="block";
    resultBox.style.display="none";
    resultBox.className="resultBox";

    setTimeout(()=>{

        let nextNumbers=[];

        data.forEach(row=>{
            for(let i=0;i<=row.length-search.length;i++){

                let match=true;

                for(let j=0;j<search.length;j++){
                    if(row[i+j]!==search[j]){
                        match=false;
                        break;
                    }
                }

                if(match && i+search.length<row.length){
                    nextNumbers.push(row[i+search.length]);
                }
            }
        });

        let total=nextNumbers.length;

        loading.style.display="none";
        resultBox.style.display="block";

        if(total===0){
            resultBox.classList.add("equal");
            resultBox.innerHTML="KHÔNG CÓ DỮ LIỆU";
            return;
        }

        let tai=nextNumbers.filter(n=>n>=11).length;
        let xiu=nextNumbers.filter(n=>n<=10).length;

        let taiPercent=((tai/total)*100).toFixed(2);
        let xiuPercent=((xiu/total)*100).toFixed(2);

        if(taiPercent>xiuPercent){
            resultBox.classList.add("tai");
            resultBox.innerHTML=`
            TÀI<br>
            ${taiPercent}%<br>
            <small>${total} lần khớp</small>
            `;
        }
        else if(xiuPercent>taiPercent){
            resultBox.classList.add("xiu");
            resultBox.innerHTML=`
            XỈU<br>
            ${xiuPercent}%<br>
            <small>${total} lần khớp</small>
            `;
        }
        else{
            resultBox.classList.add("equal");
            resultBox.innerHTML=`
            CÂN BẰNG<br>
            ${taiPercent}% - ${xiuPercent}%<br>
            <small>${total} lần khớp</small>
            `;
        }

    },1200);
}
