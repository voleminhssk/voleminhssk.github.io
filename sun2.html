<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Soi Cầu AI</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#0b0f1a,#111827);
    font-family:Arial;
    text-align:center;
    color:white;
}

/* ===== ROBOT ===== */
.robot{
    margin:40px auto 10px;
    width:140px;
    height:180px;
    position:relative;
}

.head{
    width:140px;
    height:110px;
    background:#222;
    border-radius:20px;
    position:relative;
    box-shadow:0 0 20px #00f2ff;
}

.eye{
    width:20px;
    height:20px;
    background:#00f2ff;
    border-radius:50%;
    position:absolute;
    top:35px;
    animation:blink 2s infinite;
}

.eye.left{ left:35px; }
.eye.right{ right:35px; }

@keyframes blink{
    0%,90%,100%{ height:20px; }
    95%{ height:5px; }
}

.mouth{
    width:60px;
    height:10px;
    background:#00f2ff;
    position:absolute;
    bottom:25px;
    left:40px;
    border-radius:10px;
}

.antenna{
    width:6px;
    height:30px;
    background:#00f2ff;
    position:absolute;
    top:-30px;
    left:67px;
}

.ball{
    width:14px;
    height:14px;
    background:#00f2ff;
    border-radius:50%;
    position:absolute;
    top:-40px;
    left:63px;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{ box-shadow:0 0 5px #00f2ff; }
    50%{ box-shadow:0 0 20px #00f2ff; }
    100%{ box-shadow:0 0 5px #00f2ff; }
}

/* ===== INPUT ===== */
input{
    width:60%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin:15px;
    font-size:16px;
}

button{
    padding:12px 30px;
    border-radius:10px;
    border:none;
    background:#00f2ff;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#00c3cc;
}

/* ===== RESULT ===== */
.result{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:40px;
}

.box{
    width:150px;
    padding:20px;
    border-radius:15px;
    font-size:22px;
    background:#1f2937;
    transition:0.3s;
}

.tai{ border:3px solid #ff3b3b; }
.xiu{ border:3px solid #3b82f6; }

.highlight{
    animation:flash 0.8s infinite;
}

@keyframes flash{
    0%{ transform:scale(1); box-shadow:0 0 10px white; }
    50%{ transform:scale(1.1); box-shadow:0 0 30px yellow; }
    100%{ transform:scale(1); box-shadow:0 0 10px white; }
}

.loading{
    animation:rotate 1s linear infinite;
}

@keyframes rotate{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

</style>
</head>

<body>

<h1>SOI CẦU AI (SunWin)</h1>
<p>Nhập chuỗi ví dụ: 11,13,6</p>

<div class="robot" id="robot">
    <div class="antenna"></div>
    <div class="ball"></div>
    <div class="head">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
    </div>
</div>

<input type="text" id="searchInput" placeholder="Nhập chuỗi cần phân tích...">
<br>
<button onclick="analyze()">PHÂN TÍCH</button>

<div class="result">
    <div class="box tai" id="taiBox">🔥 TÀI: --%</div>
    <div class="box xiu" id="xiuBox">❄️ XỈU: --%</div>
</div>

<script>

/* ====== DATA 19 MẢNG ====== */

[7,11,11,9,9,9,11,6,8,8,7,13,9,9,10,13,16,12,9,10,11,7,15,13,10,14,7,12,11,12,14,10,12,10,11,6,11,13,9,11,7,6,8,10,6,15,14,15,9,13,6,12,13,14,13,7,10,11,7,4,9,11,11,11,7,15,13,11,11,12,9,6,7,12,4,8,6,10,9,10,11],

[3,7,9,9,6,10,9,9,8,8,11,12,10,10,12,7,12,7,8,3,4,6,12,16,12,12,11,11,12,12,10,11,17,12,10,9,10,6,10,12,9,10,6,12,10,11,6,10,16,14,6,16],
[16,6,10,9,10,7,10,9,6,15,9,8,6,12,9,10,10,7,8,12,6,8,10,12,11,8,10,8,9,10,12,11,6,12,8,9,9,14,5,12,9,9,7,16,13,13,6,11,7,11,10,8,11,9,13,9,9,8,14,8,15,13,12,8,11,14,15,10,10,13,12,8,8,13,13,10,9,9,15,17,12],
[5,10,10,11,7,10,15,7,11,9,9,18,6,19,11,8,12,13,8,11,7,11,15,5,8,8,9,15,7,10,8,12,13,12,13,12,12,10,11,13,6,8,10],
[11,8,9,8,12,12,12,8,7,9,8,7,9,10,9,12,9,13,10,10,11,12,6,8,10,8,10,9,10,15,9,9,5,10,13,16,15,15,8,7,11,8,11,12,10],

[9,15,9,4,14,10,12,9,4,11,8,15,7,14,9,8,12,15,15,4,12,11,9,12,7,7,14],
[7,11,10,6,10,11,14,12,12,15,10,9,7,6,11,10,12,12,12,10,10,11,17,14,4,12,12,11,12,15,13,9,15,9,9,8,11,11,9,9,8,15,9]
];

function analyze(){
    const robot = document.getElementById("robot");
    const taiBox = document.getElementById("taiBox");
    const xiuBox = document.getElementById("xiuBox");

    taiBox.classList.remove("highlight");
    xiuBox.classList.remove("highlight");

    robot.classList.add("loading");

    setTimeout(()=>{

        let search = document.getElementById("searchInput").value
            .split(',')
            .map(x => parseInt(x.trim()));

        let nextNumbers = [];

        data.forEach(row=>{
            for(let i=0;i<=row.length-search.length;i++){
                let match=true;
                for(let j=0;j<search.length;j++){
                    if(row[i+j]!==search[j]){
                        match=false;
                        break;
                    }
                }
                if(match && i+search.length<row.length){
                    nextNumbers.push(row[i+search.length]);
                }
            }
        });

        if(nextNumbers.length===0){
            taiBox.innerHTML="🔥 TÀI: 0%";
            xiuBox.innerHTML="❄️ XỈU: 0%";
            robot.classList.remove("loading");
            return;
        }

        let tai = nextNumbers.filter(n=>n>=11).length;
        let xiu = nextNumbers.filter(n=>n<=10).length;
        let total = nextNumbers.length;

        let taiPercent = ((tai/total)*100).toFixed(2);
        let xiuPercent = ((xiu/total)*100).toFixed(2);

        taiBox.innerHTML="🔥 TÀI: "+taiPercent+"%";
        xiuBox.innerHTML="❄️ XỈU: "+xiuPercent+"%";

        if(taiPercent > xiuPercent){
            taiBox.classList.add("highlight");
        }else if(xiuPercent > taiPercent){
            xiuBox.classList.add("highlight");
        }

        robot.classList.remove("loading");

    },1200);
}

</script>

</body>
</html>
