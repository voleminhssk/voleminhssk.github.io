/* ===== FUNCTION ===== */
function analyze(){

    const loading=document.getElementById("loadingGif");
    const resultBox=document.getElementById("resultBox");
    const historyBox=document.getElementById("historyBox");

    loading.style.display="block";
    resultBox.innerHTML="";
    historyBox.innerHTML="";

    setTimeout(()=>{

        let search=document.getElementById("searchInput").value
        .split(',')
        .map(x=>parseInt(x.trim()));

        let matches=[];

        data.forEach((row,rowIndex)=>{

            for(let i=0;i<=row.length-search.length;i++){

                let match=true;

                for(let j=0;j<search.length;j++){
                    if(row[i+j]!==search[j]){
                        match=false;
                        break;
                    }
                }

                if(match){

                    let left=row.slice(Math.max(0,i-2),i);
                    let right=row.slice(i+search.length,i+search.length+2);

                    matches.push({
                        left,left,
                        match:search,
                        right:right,
                        index:rowIndex
                    });
                }
            }
        });

        // lấy 5 chuỗi mới nhất
        matches = matches.reverse().slice(0,5);

        loading.style.display="none";

        if(matches.length===0){
            resultBox.innerHTML="❌ Không tìm thấy";
            return;
        }

        resultBox.innerHTML="✅ Tìm thấy "+matches.length+" chuỗi gần nhất";

        let html="";

        matches.forEach(m=>{
            html+=`
            <div class="historyItem">
                <span class="left">[${m.left.join(",")}]</span>
                <span class="match"> | ${m.match.join(",")} | </span>
                <span class="right">[${m.right.join(",")}]</span>
            </div>
            `;
        });

        historyBox.innerHTML=html;

    },800);
}
