function analyze(){

    const resultBox=document.getElementById("resultBox");
    resultBox.style.display="none";
    resultBox.className="resultBox";

    setTimeout(()=>{

        let search=document.getElementById("searchInput").value
        .split(',')
        .map(x=>parseInt(x.trim()));

        let nextNumbers=[];

        data.forEach(row=>{
            for(let i=0;i<=row.length-search.length;i++){
                let match=true;
                for(let j=0;j<search.length;j++){
                    if(row[i+j]!==search[j]){
                        match=false;
                        break;
                    }
                }
                if(match && i+search.length<row.length){
                    nextNumbers.push(row[i+search.length]);
                }
            }
        });

        let tai=nextNumbers.filter(n=>n>=11).length;
        let xiu=nextNumbers.filter(n=>n<=10).length;
        let total=nextNumbers.length;

        let taiPercent=total?((tai/total)*100).toFixed(2):0;
        let xiuPercent=total?((xiu/total)*100).toFixed(2):0;

        resultBox.style.display="block";

        if(taiPercent>xiuPercent){
            resultBox.classList.add("tai");
            resultBox.innerHTML="TÀI<br>"+taiPercent+"%";
        }
        else if(xiuPercent>taiPercent){
            resultBox.classList.add("xiu");
            resultBox.innerHTML="XỈU<br>"+xiuPercent+"%";
        }
        else{
            resultBox.classList.add("equal");
            resultBox.innerHTML="CÂN BẰNG<br>50% - 50%";
        }

    },1200);
