<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* KHUNG CHÍNH */
.container{
    width:90%;
    max-width:600px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    box-shadow:0 0 40px rgba(0,255,255,0.2);
    text-align:center;
}

h1{
    color:gold;
    margin-bottom:25px;
}

/* INPUT */
input{
    width:80%;
    padding:14px;
    border-radius:12px;
    border:none;
    font-size:16px;
    margin-bottom:20px;
    text-align:center;
}

/* BUTTON */
button{
    padding:14px 35px;
    border-radius:12px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
    background:linear-gradient(45deg,#00f2ff,#00c3ff);
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* ROBOT */
#robotGif{
    width:160px;
    margin:20px auto;
    display:block;
}

/* RESULT BOX */
.resultBox{
    display:none;
    margin-top:30px;
    padding:25px;
    border-radius:20px;
    font-size:28px;
    font-weight:bold;
    animation:fadeIn 0.6s ease;
}

.loadingGif{
    display:none;
    width:120px;
    margin:20px auto;
}

.popupGif{
    display:none;
    position:fixed;
    top:20px;
    right:20px;
    width:90px;
    z-index:999;
}

.tai{
    background:#2b0000;
    border:3px solid red;
    box-shadow:0 0 30px red;
}

.xiu{
    background:#001a2b;
    border:3px solid #00aaff;
    box-shadow:0 0 30px #00aaff;
}

.equal{
    background:#333;
    border:3px solid gold;
    box-shadow:0 0 30px gold;
}

/* LOADING */
.loading{
    margin-top:20px;
    display:none;
    font-size:18px;
    color:#00f2ff;
}

/* POPUP */
.popup{
    position:fixed;
    top:20px;
    right:20px;
    background:#111;
    padding:15px 25px;
    border-radius:12px;
    box-shadow:0 0 20px cyan;
    display:none;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}
</style>

/* ====== HÀM PHÂN TÍCH ====== */
function analyze(){

    const popup=document.getElementById("popupGif");
    const loading=document.getElementById("loadingGif");
    const resultBox=document.getElementById("resultBox");

    popup.style.display="block";
    loading.style.display="block";
    resultBox.style.display="none";
    resultBox.className="resultBox";

    setTimeout(()=>{
        popup.style.display="none";

        let search=document.getElementById("searchInput").value
        .split(',')
        .map(x=>parseInt(x.trim()));

        let nextNumbers=[];

        data.forEach(row=>{
            for(let i=0;i<=row.length-search.length;i++){
                let match=true;
                for(let j=0;j<search.length;j++){
                    if(row[i+j]!==search[j]){
                        match=false;
                        break;
                    }
                }
                if(match && i+search.length<row.length){
                    nextNumbers.push(row[i+search.length]);
                }
            }
        });

        let tai=nextNumbers.filter(n=>n>=11).length;
        let xiu=nextNumbers.filter(n=>n<=10).length;
        let total=nextNumbers.length;

        let taiPercent=total?((tai/total)*100).toFixed(2):0;
        let xiuPercent=total?((xiu/total)*100).toFixed(2):0;

        loading.style.display="none";
        resultBox.style.display="block";

        if(taiPercent>xiuPercent){
            resultBox.classList.add("tai");
            resultBox.innerHTML="TÀI<br>"+taiPercent+"%";
        }
        else if(xiuPercent>taiPercent){
            resultBox.classList.add("xiu");
            resultBox.innerHTML="XỈU<br>"+xiuPercent+"%";
        }
        else{
            resultBox.classList.add("equal");
            resultBox.innerHTML="CÂN BẰNG<br>50% - 50%";
        }

    },1500);
}
