<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Baccarat AI Smart</title>
<style>
body {background:#020617;color:#fff;text-align:center;font-family:Arial}
input{width:80%;padding:12px;font-size:16px}
button{padding:10px 20px;margin-top:10px;background:#38bdf8;border:none}
#out{margin-top:20px;font-size:18px}
</style>
</head>
<body>

<h2>🧠 Baccarat AI Smart Analyzer</h2>

<input id="data" placeholder="Nhập: B P B B P ..." />
<br>
<button onclick="AI()">Phân tích</button>

<div id="out"></div>

<script>
let memory = JSON.parse(localStorage.getItem("bcr_ai_pro") || "[]");

function AI(){
    let arr = document.getElementById("data").value.trim().toUpperCase().split(" ");

    if(arr.length < 6){
        out("❌ Cần tối thiểu 6 ván");
        return;
    }

    memory.push(arr.join(""));
    localStorage.setItem("bcr_ai_pro", JSON.stringify(memory));

    let score = {B:0, P:0};

    let last = arr[arr.length-1];

    // ===== 1. Cầu bệt =====
    let streak = 1;
    for(let i=arr.length-2;i>=0;i--){
        if(arr[i]===last) streak++;
        else break;
    }
    if(streak>=3) score[last]+=4;

    // ===== 2. Cầu đảo =====
    if(arr[arr.length-1]!==arr[arr.length-2]){
        score[last==="B"?"P":"B"]+=3;
    }

    // ===== 3. Cầu 1-1 =====
    let pingpong=true;
    for(let i=1;i<arr.length;i++){
        if(arr[i]===arr[i-1]) pingpong=false;
    }
    if(pingpong){
        score[last==="B"?"P":"B"]+=4;
    }

    // ===== 4. Cầu 2-1 =====
    if(arr.slice(-3).join("")==="BBP") score["B"]+=2;
    if(arr.slice(-3).join("")==="PPB") score["P"]+=2;

    // ===== 5. Tỉ lệ =====
    let B = arr.filter(x=>x==="B").length;
    let P = arr.length - B;
    if(B>P) score["P"]+=1;
    else score["B"]+=1;

    // ===== 6. Soi cầu giống =====
    let sim={B:0,P:0};
    memory.forEach(seq=>{
        if(seq.length>=arr.length){
            let cut=seq.slice(0,arr.length-1);
            if(cut===arr.slice(0,arr.length-1).join("")){
                let next=seq[arr.length-1];
                if(next) sim[next]++;
            }
        }
    });

    score["B"]+=sim["B"];
    score["P"]+=sim["P"];

    // ===== 7. Trend strength =====
    let trend = Math.abs(B-P);
    if(trend>=3){
        score[B>P?"B":"P"]+=2;
    }

    // ===== FINAL =====
    let predict = score["B"]>score["P"]?"B":"P";
    let confidence = Math.min(95,50+Math.abs(score["B"]-score["P"])*8);

    let action="BỎ";
    if(confidence>65) action="ĐÁNH";
    if(confidence>80) action="ĐÁNH MẠNH";

    out(`
    📊 Tổng: ${arr.length}<br>
    🔁 Streak: ${streak} (${last})<br><br>

    🧠 Điểm AI:<br>
    B: ${score["B"]} | P: ${score["P"]}<br><br>

    🔍 Soi cầu giống:<br>
    B: ${sim["B"]} | P: ${sim["P"]}<br><br>

    🔮 Dự đoán: <b>${predict}</b><br>
    📈 Độ tin cậy: ${confidence}%<br><br>

    ⚡ Khuyến nghị: <b>${action}</b>
    `);
}

function out(x){
    document.getElementById("out").innerHTML=x;
}
</script>

</body>
</html>
