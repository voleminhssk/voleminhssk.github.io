<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>🔥 Baccarat AI ULTRA</title>

<style>
body{background:#0b0f1a;color:#fff;font-family:Arial;text-align:center;padding:20px;}
.box{max-width:520px;margin:auto;background:#111827;padding:20px;border-radius:12px;}
button,input{padding:10px;border:none;border-radius:6px;width:100%;margin:5px 0;}
.row{display:flex;gap:8px;}
.btnP{background:#2196f3;}
.btnB{background:#e53935;}
.btnT{background:#fbc02d;color:#000;}
.btnMain{background:#00ffc3;}
.bar{height:8px;border-radius:4px;margin:4px 0;}
</style>
</head>

<body>

<div class="box">
<h2>🔥 Baccarat AI ULTRA</h2>

<div class="row">
<button class="btnP" onclick="add('P')">🔵 Con</button>
<button class="btnB" onclick="add('B')">🔴 Cái</button>
<button class="btnT" onclick="add('T')">🟡 Hòa</button>
</div>

<input id="history" readonly>

<input id="bTotal" type="number" placeholder="Tổng cái">
<input id="pTotal" type="number" placeholder="Tổng con">
<input id="tTotal" type="number" placeholder="Tổng hòa">

<button class="btnMain" onclick="calc()">📊 Phân tích</button>

<div id="result"></div>

</div>

<script>

let historyArr=[];

// ===== ADD =====
function add(x){
    historyArr.push(x);
    document.getElementById("history").value = historyArr.join(",");
}

// ===== MARKOV N =====
function markovN(n){

    let map={};

    for(let i=0;i<historyArr.length-n;i++){
        let key=historyArr.slice(i,i+n).join("");
        let next=historyArr[i+n];

        if(!map[key]) map[key]={B:0,P:0,T:0};
        map[key][next]++;
    }

    return map;
}

// ===== CALC =====
function calc(){

let resultDiv=document.getElementById("result");

if(historyArr.length<6){
    alert("Nhập ít nhất 6 tay!");
    return;
}

// ===== FULL =====
let full={B:0,P:0,T:0};
historyArr.forEach(x=>full[x]++);
let total=historyArr.length;

full.B/=total;
full.P/=total;
full.T/=total;

// ===== MARKOV =====
let m1=markovN(1);
let m2=markovN(2);
let m3=markovN(3);

let last1=historyArr.slice(-1).join("");
let last2=historyArr.slice(-2).join("");
let last3=historyArr.slice(-3).join("");

function getProb(map,key){
    if(!map[key]) return {B:0.33,P:0.33,T:0.34};
    let s=map[key].B+map[key].P+map[key].T;
    return {
        B:map[key].B/s,
        P:map[key].P/s,
        T:map[key].T/s
    };
}

let mk1=getProb(m1,last1);
let mk2=getProb(m2,last2);
let mk3=getProb(m3,last3);

// ===== PATTERN LẶP =====
let pattern={B:0,P:0,T:0};

for(let i=0;i<historyArr.length-4;i++){
    let seq=historyArr.slice(i,i+3).join("");
    let next=historyArr[i+3];

    if(seq===last3){
        pattern[next]++;
    }
}

let pSum=pattern.B+pattern.P+pattern.T;
if(pSum>0){
    pattern.B/=pSum;
    pattern.P/=pSum;
    pattern.T/=pSum;
}else{
    pattern={...full};
}

// ===== SHORT =====
let recent=historyArr.slice(-10);
let short={B:0,P:0,T:0};
recent.forEach(x=>short[x]++);
let sTotal=recent.length;

short.B/=sTotal;
short.P/=sTotal;
short.T/=sTotal;

// ===== TOTAL INPUT =====
let bTotal=Number(document.getElementById("bTotal").value)||0;
let pTotal=Number(document.getElementById("pTotal").value)||0;
let tTotal=Number(document.getElementById("tTotal").value)||0;

let sum=bTotal+pTotal+tTotal;

let totalAI=sum>0?{
    B:(bTotal+1)/(sum+3),
    P:(pTotal+1)/(sum+3),
    T:(tTotal+1)/(sum+3)
}:{B:0.4586,P:0.4462,T:0.0952};

// ===== FINAL BLEND =====
let final={
    B:0.25*full.B + 0.20*mk1.B + 0.15*mk2.B + 0.10*mk3.B + 0.10*pattern.B + 0.10*short.B + 0.10*totalAI.B,
    P:0.25*full.P + 0.20*mk1.P + 0.15*mk2.P + 0.10*mk3.P + 0.10*pattern.P + 0.10*short.P + 0.10*totalAI.P,
    T:0.25*full.T + 0.20*mk1.T + 0.15*mk2.T + 0.10*mk3.T + 0.10*pattern.T + 0.10*short.T + 0.10*totalAI.T
};

// normalize
let fSum=final.B+final.P+final.T;
final.B/=fSum;
final.P/=fSum;
final.T/=fSum;

// ===== RESULT =====
let result="🔴 CÁI";
let max=final.B;

if(final.P>max){result="🔵 CON";max=final.P;}
if(final.T>max){result="🟡 HÒA";}

// ===== UI =====
function bar(p,c){
return `<div class="bar" style="width:${p}%;background:${c}"></div>`;
}

resultDiv.innerHTML=`
🔥 <b>AI PHÂN TÍCH TOÀN CHUỖI</b><br><br>

📊 FULL: ${(full.B*100).toFixed(1)} / ${(full.P*100).toFixed(1)} / ${(full.T*100).toFixed(1)}<br>
🧠 MK1: ${(mk1.B*100).toFixed(1)} / ${(mk1.P*100).toFixed(1)} / ${(mk1.T*100).toFixed(1)}<br>
🧠 MK2: ${(mk2.B*100).toFixed(1)} / ${(mk2.P*100).toFixed(1)} / ${(mk2.T*100).toFixed(1)}<br>
🧠 MK3: ${(mk3.B*100).toFixed(1)} / ${(mk3.P*100).toFixed(1)} / ${(mk3.T*100).toFixed(1)}<br>

<br>🎯 FINAL<br>

🔴 ${(final.B*100).toFixed(2)}%
${bar(final.B*100,'#e53935')}

🔵 ${(final.P*100).toFixed(2)}%
${bar(final.P*100,'#2196f3')}

🟡 ${(final.T*100).toFixed(2)}%
${bar(final.T*100,'#fbc02d')}

<br><br>👉 <b>${result}</b>
`;

}

</script>

</body>
</html>
