<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>🔥 Baccarat AI 8 Deck PRO MAX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    text-align:center;
}
.container{padding:20px;}
h1{color:#00ffd5;}

.box{
    background:#00000055;
    padding:20px;
    border-radius:10px;
    display:inline-block;
}

input{
    padding:12px;
    margin:6px;
    border:none;
    border-radius:5px;
    width:130px;
    text-align:center;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:5px;
    background:#00ffd5;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:20px;
    font-size:20px;
}

strong{
    color:#00ff88;
    font-size:24px;
}
</style>
</head>

<body>

<div class="container">
<h1>🤖 BACCARAT AI 8 DECK PRO</h1>

<div class="box">
    <p>Nhập tổng đã ra</p>
    <input id="player" placeholder="Tổng CON">
    <input id="banker" placeholder="Tổng CÁI">
    <br>
    <button onclick="run()">PHÂN TÍCH</button>
</div>

<div class="result" id="result"></div>
</div>

<script>

// ===== RNG MIX =====

// PCG
let seed = Date.now();
function pcg(){
    seed = (seed * 1664525 + 1013904223) >>> 0;
    return seed / 4294967296;
}

// XORSHIFT
let x = 123456789;
function xorshift(){
    x ^= x << 13;
    x ^= x >> 17;
    x ^= x << 5;
    return (x >>> 0) / 4294967296;
}

// Mersenne Twister (lite)
class MT{
    constructor(s){
        this.mt = new Array(624);
        this.i = 0;
        this.mt[0] = s;
        for(let j=1;j<624;j++){
            this.mt[j] = (1812433253 * (this.mt[j-1] ^ (this.mt[j-1]>>30)) + j);
        }
    }
    next(){
        if(this.i===0) this.gen();
        let y = this.mt[this.i];
        y ^= y>>11;
        y ^= (y<<7)&2636928640;
        y ^= (y<<15)&4022730752;
        y ^= y>>18;
        this.i=(this.i+1)%624;
        return y/4294967296;
    }
    gen(){
        for(let i=0;i<624;i++){
            let y=(this.mt[i]&0x80000000)+(this.mt[(i+1)%624]&0x7fffffff);
            this.mt[i]=this.mt[(i+397)%624]^(y>>1);
            if(y%2!==0) this.mt[i]^=2567483615;
        }
    }
}
let mt = new MT(Date.now());

// MIX RNG
function rng(){
    return (pcg() + xorshift() + mt.next()) / 3;
}

// ===== TẠO 8 DECK =====
function createDeck(){
    let deck = [];
    for(let d=0; d<8; d++){
        for(let i=1;i<=13;i++){
            for(let j=0;j<4;j++){
                let val = i;
                if(val > 9) val = 0;
                deck.push(val);
            }
        }
    }
    return deck;
}

// shuffle
function shuffle(deck){
    for(let i=deck.length-1;i>0;i--){
        let j = Math.floor(rng()* (i+1));
        [deck[i],deck[j]]=[deck[j],deck[i]];
    }
}

// rút bài
function draw(deck){
    return deck.pop();
}

// tính điểm baccarat
function score(cards){
    return cards.reduce((a,b)=>a+b,0)%10;
}

// ===== MONTE CARLO =====
function simulate(playerInput, bankerInput, runs=200000){

    let pWin=0, bWin=0, tie=0;

    for(let r=0;r<runs;r++){

        let deck = createDeck();
        shuffle(deck);

        let p = [draw(deck), draw(deck)];
        let b = [draw(deck), draw(deck)];

        let pScore = score(p);
        let bScore = score(b);

        // bias theo input
        if(playerInput > bankerInput){
            pScore += rng()*0.5;
        }else if(bankerInput > playerInput){
            bScore += rng()*0.5;
        }

        if(pScore > bScore) pWin++;
        else if(bScore > pScore) bWin++;
        else tie++;
    }

    return {
        p:(pWin/runs*100).toFixed(2),
        b:(bWin/runs*100).toFixed(2),
        t:(tie/runs*100).toFixed(2)
    };
}

// ===== MAIN =====
function run(){
    let p = parseInt(document.getElementById("player").value);
    let b = parseInt(document.getElementById("banker").value);

    if(isNaN(p)||isNaN(b)){
        alert("Nhập đủ dữ liệu!");
        return;
    }

    let res = simulate(p,b);

    let predict = res.p > res.b ? "PLAYER" : "BANKER";
    let confidence = Math.abs(res.p - res.b);

    document.getElementById("result").innerHTML = `
        Player: ${res.p}%<br>
        Banker: ${res.b}%<br>
        Tie: ${res.t}%<br><br>

        <strong>👉 Dự đoán: ${predict}</strong><br>
        🔥 Độ tin cậy: ${confidence.toFixed(2)}%
    `;
}

</script>

</body>
</html>
