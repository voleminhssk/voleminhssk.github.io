<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>🔥 Baccarat AI PRO MAX</title>

<style>
body{
    background:#0b0f1a;
    color:#fff;
    font-family:Arial;
    text-align:center;
    padding:20px;
}
.box{
    max-width:460px;
    margin:auto;
    background:#111827;
    padding:20px;
    border-radius:12px;
}
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:6px;
    text-align:center;
}
button{
    width:100%;
    padding:12px;
    background:#00ffc3;
    border:none;
    border-radius:6px;
    font-weight:bold;
}
.result{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="box">
<h2>🔥 Baccarat AI PRO MAX</h2>

<input id="bTotal" type="number" placeholder="Tổng cái (Banker)">
<input id="pTotal" type="number" placeholder="Tổng con (Player)">
<input id="tTotal" type="number" placeholder="Tổng hòa (Tie)">
<input id="history" placeholder="8 phiên VD: B,P,T,B,B,P,T,P">

<button onclick="calc()">Tính xác suất</button>

<div id="result" class="result"></div>
</div>

<script>
function calc(){

let bTotal = parseFloat(document.getElementById("bTotal").value)||0;
let pTotal = parseFloat(document.getElementById("pTotal").value)||0;
let tTotal = parseFloat(document.getElementById("tTotal").value)||0;

let h = document.getElementById("history").value.toUpperCase().split(",");

if(h.length < 8){
    alert("Nhập ít nhất 8 phiên!");
    return;
}

// base
let baseB = 0.4586;
let baseP = 0.4462;
let baseT = 0.0952;

// LONG
let sum = bTotal + pTotal + tTotal;
let longB = sum>0 ? bTotal/sum : 0.33;
let longP = sum>0 ? pTotal/sum : 0.33;
let longT = sum>0 ? tTotal/sum : 0.34;

// SHORT
let w = [1,1,2,3,5,8,13,21];
let sb=0, sp=0, st=0;

for(let i=0;i<8;i++){
let x = h[i].trim();
if(x=="B") sb+=w[i];
if(x=="P") sp+=w[i];
if(x=="T") st+=w[i];
}

let totalShort = sb+sp+st;
let shortB = sb/totalShort;
let shortP = sp/totalShort;
let shortT = st/totalShort;

// PATTERN
if(h[7]==h[6]){
    if(h[7]=="B") shortB+=0.02;
    if(h[7]=="P") shortP+=0.02;
    if(h[7]=="T") shortT+=0.02;
}else{
    if(h[7]=="B") shortP+=0.015;
    else shortB+=0.015;
}

// tie gần nhất
if(h[7]=="T") shortT+=0.03;

// FINAL
let finalB = 0.5*shortB + 0.3*longB + 0.2*baseB;
let finalP = 0.5*shortP + 0.3*longP + 0.2*baseP;
let finalT = 0.5*shortT + 0.3*longT + 0.2*baseT;

let total = finalB + finalP + finalT;

let bPercent = ((finalB/total)*100).toFixed(2);
let pPercent = ((finalP/total)*100).toFixed(2);
let tPercent = ((finalT/total)*100).toFixed(2);

let result = "🔴 BANKER";
if(finalP > finalB && finalP > finalT) result = "🔵 PLAYER";
if(finalT > finalB && finalT > finalP) result = "🟡 TIE";

document.getElementById("result").innerHTML =
`Banker: ${bPercent}%<br>
 Player: ${pPercent}%<br>
 Tie: ${tPercent}%<br><br>
 👉 ${result}`;
}
</script>

</body>
</html>
