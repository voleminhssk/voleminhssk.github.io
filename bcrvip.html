<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>🔥 Baccarat AI</title>

<style>
body{background:#0b0f1a;color:#fff;font-family:Arial;text-align:center;padding:20px;}
.box{max-width:520px;margin:auto;background:#111827;padding:20px;border-radius:12px;}
input{width:100%;padding:10px;margin:6px 0;border:none;border-radius:6px;text-align:center;}
button{padding:10px;border:none;border-radius:6px;font-weight:bold;width:100%;}
.row{display:flex;gap:8px;}
.row button{flex:1}
.result{margin-top:15px;text-align:left;line-height:1.5;}
.btnP{background:#2196f3;}
.btnB{background:#e53935;}
.btnT{background:#fbc02d;color:#000;}
.btnMain{background:#00ffc3;color:#000;}
.btnWin{background:#4caf50;}
.btnLose{background:#ff5252;}
</style>
</head>

<body>

<div class="box">
<h2>🔥 Baccarat AI</h2>

<div class="row">
<button class="btnP" onclick="add('P')">🔵 Con</button>
<button class="btnB" onclick="add('B')">🔴 Cái</button>
<button class="btnT" onclick="add('T')">🟡 Hòa</button>
</div>

<input id="history" readonly>

<input id="bTotal" type="number" placeholder="Tổng cái">
<input id="pTotal" type="number" placeholder="Tổng con">
<input id="tTotal" type="number" placeholder="Tổng hòa">

<button class="btnMain" onclick="calc()">📊 Phân tích</button>

<h3>📊 Thống kê</h3>
<div>✅ Thắng: <span id="win">0</span></div>
<div>❌ Thua: <span id="lose">0</span></div>
<div>📈 Tỷ lệ: <span id="rate">0%</span></div>

<div id="result" class="result"></div>

<div class="row" style="margin-top:10px;">
<button class="btnWin" onclick="feedback(true)">✅ Thắng</button>
<button class="btnLose" onclick="feedback(false)">❌ Thua</button>
</div>

</div>

<script>

// ===== GLOBAL =====
let historyArr=[];
let learningBias={B:0,P:0,T:0};
let totalWin=0,totalLose=0;
let lastPrediction=null;

// ===== ADD =====
function add(x){
    historyArr.push(x);
    if(historyArr.length>15) historyArr.shift();
    history.value=historyArr.join(",");
}

// ===== STREAK =====
function getStreak(){
    let last=historyArr.at(-1);
    let streak=1;
    for(let i=historyArr.length-2;i>=0;i--){
        if(historyArr[i]==last) streak++;
        else break;
    }
    return {last,streak};
}

// ===== CALC =====
function calc(){

if(historyArr.length<12){
    alert("⚠️ Cần ít nhất 12 tay!");
    return;
}

let bTotal=+bTotalInput.value||0;
let pTotal=+pTotalInput.value||0;
let tTotal=+tTotalInput.value||0;
let sum=bTotal+pTotal+tTotal;

// ===== BASE =====
let base={B:0.4586,P:0.4462,T:0.0952};

// ===== LONG =====
let long={
B:(bTotal+1)/(sum+3),
P:(pTotal+1)/(sum+3),
T:(tTotal+1)/(sum+3)
};

// ===== SHORT =====
let w=[144,89,55,34,21,13,8,5,3,2,1];
let short={B:0,P:0,T:0};
historyArr.forEach((v,i)=>short[v]+=w[i]||1);

let ts=short.B+short.P+short.T;
short.B/=ts; short.P/=ts; short.T/=ts;

// ===== STREAK =====
let {last,streak}=getStreak();

// ===== 🔥 ANTI-STREAK AI =====
let anti={B:0,P:0,T:0};
let antiStrength=0;

if(streak>=4){
    // bắt đầu nghi ngờ bệt
    antiStrength=0.15;
}

if(streak>=5){
    // bẻ mạnh hơn
    antiStrength=0.25;
}

if(streak>=6){
    // cực mạnh
    antiStrength=0.35;
}

// hướng bẻ
if(last=="B") anti.P=antiStrength;
if(last=="P") anti.B=antiStrength;

// ===== FINAL =====
let final={
B:0.35*short.B+0.25*long.B+0.2*base.B+anti.B+learningBias.B,
P:0.35*short.P+0.25*long.P+0.2*base.P+anti.P+learningBias.P,
T:0.35*short.T+0.25*long.T+0.2*base.T+anti.T+learningBias.T
};

let tot=final.B+final.P+final.T;
final.B/=tot; final.P/=tot; final.T/=tot;

// ===== RESULT =====
let result="🔴 CÁI",max=final.B;
if(final.P>max){result="🔵 CON";max=final.P;}
if(final.T>max){result="🟡 HÒA";max=final.T;}

lastPrediction=result;

// ===== CONFIDENCE =====
let arr=[final.B,final.P,final.T].sort((a,b)=>b-a);
let confidence=((arr[0]-arr[1])*100).toFixed(1);

// ===== DISPLAY =====
resultDiv.innerHTML=
`📈 Streak: ${streak}
🧠 Anti-bệt: ${(antiStrength*100).toFixed(0)}%

🔴 ${(final.B*100).toFixed(2)}%
🔵 ${(final.P*100).toFixed(2)}%
🟡 ${(final.T*100).toFixed(2)}%

👉 <b>${result}</b>
🔥 Confidence: ${confidence}%`;

updateStats();
}

// ===== FEEDBACK =====
function feedback(win){

if(!lastPrediction) return;

totalWin+=win?1:0;
totalLose+=win?0:1;

let map={"🔴 CÁI":"B","🔵 CON":"P","🟡 HÒA":"T"};
let key=map[lastPrediction];

if(win){
learningBias[key]+=0.01;
}else{
learningBias[key]-=0.03;
if(key=="B") learningBias.P+=0.02;
if(key=="P") learningBias.B+=0.02;
}

// decay
for(let k in learningBias){
learningBias[k]*=0.97;
learningBias[k]=Math.max(-0.1,Math.min(0.1,learningBias[k]));
}

updateStats();

// auto calc lại khi thua
if(!win) setTimeout(calc,300);
}

// ===== STATS =====
function updateStats(){
win.innerText=totalWin;
lose.innerText=totalLose;
let t=totalWin+totalLose;
rate.innerText=t?((totalWin/t*100).toFixed(1)+"%"):"0%";
}

</script>

</body>
</html>
