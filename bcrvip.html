<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>🔥 Baccarat AI ADVANCED</title>

<style>
body{
    background:#0b0f1a;
    color:#fff;
    font-family:Arial;
    text-align:center;
    padding:20px;
}
.box{
    max-width:520px;
    margin:auto;
    background:#111827;
    padding:20px;
    border-radius:12px;
}
button,input{
    padding:10px;
    border:none;
    border-radius:6px;
    width:100%;
    margin:5px 0;
}
.row{display:flex;gap:8px;}
.btnP{background:#2196f3;}
.btnB{background:#e53935;}
.btnT{background:#fbc02d;color:#000;}
.btnMain{background:#00ffc3;}
.bar{height:8px;border-radius:4px;margin:4px 0;}
</style>
</head>

<body>

<div class="box">
<h2>🔥 Baccarat AI ADVANCED</h2>

<div class="row">
<button class="btnP" onclick="add('P')">🔵 Con</button>
<button class="btnB" onclick="add('B')">🔴 Cái</button>
<button class="btnT" onclick="add('T')">🟡 Hòa</button>
</div>

<input id="history" readonly>

<input id="bTotal" type="number" placeholder="Tổng cái">
<input id="pTotal" type="number" placeholder="Tổng con">
<input id="tTotal" type="number" placeholder="Tổng hòa">

<button class="btnMain" onclick="calc()">📊 Phân tích</button>

<div id="result"></div>

</div>

<script>

let historyArr = [];

// ===== ADD =====
function add(x){
    historyArr.push(x);
    document.getElementById("history").value = historyArr.join(",");
}

// ===== CALC =====
function calc(){

let resultDiv = document.getElementById("result");

if(historyArr.length < 5){
    alert("Nhập ít nhất 5 tay!");
    return;
}

// ===== FULL =====
let full={B:0,P:0,T:0};
historyArr.forEach(x=>full[x]++);
let total=historyArr.length;

full.B/=total;
full.P/=total;
full.T/=total;

// ===== MARKOV (CHUỖI CHUYỂN TIẾP) =====
let markov={
    B:{B:0,P:0,T:0},
    P:{B:0,P:0,T:0},
    T:{B:0,P:0,T:0}
};

for(let i=0;i<historyArr.length-1;i++){
    let cur=historyArr[i];
    let next=historyArr[i+1];
    markov[cur][next]++;
}

// chuẩn hóa
for(let k in markov){
    let sum=markov[k].B+markov[k].P+markov[k].T;
    if(sum>0){
        markov[k].B/=sum;
        markov[k].P/=sum;
        markov[k].T/=sum;
    }
}

// lấy trạng thái hiện tại
let last=historyArr[historyArr.length-1];
let markovProb = markov[last];

// ===== SHORT TREND =====
let recent=historyArr.slice(-10);
let short={B:0,P:0,T:0};

recent.forEach(x=>short[x]++);
let totalShort=recent.length;

short.B/=totalShort;
short.P/=totalShort;
short.T/=totalShort;

// ===== STREAK =====
let streak=1;
for(let i=historyArr.length-2;i>=0;i--){
    if(historyArr[i]==last) streak++;
    else break;
}

// ===== PATTERN =====
let pattern={B:0,P:0,T:0};

if(streak>=4){
    if(last=="B"){pattern.P=0.65;pattern.B=0.25;}
    if(last=="P"){pattern.B=0.65;pattern.P=0.25;}
}else{
    pattern={...short};
}

// ===== TOTAL INPUT =====
let bTotal=Number(document.getElementById("bTotal").value)||0;
let pTotal=Number(document.getElementById("pTotal").value)||0;
let tTotal=Number(document.getElementById("tTotal").value)||0;

let sum=bTotal+pTotal+tTotal;

let totalAI = sum>0 ? {
    B:(bTotal+1)/(sum+3),
    P:(pTotal+1)/(sum+3),
    T:(tTotal+1)/(sum+3)
}:{B:0.4586,P:0.4462,T:0.0952};

// ===== FINAL BLEND =====
let final={
    B:0.30*full.B + 0.25*markovProb.B + 0.20*short.B + 0.15*pattern.B + 0.10*totalAI.B,
    P:0.30*full.P + 0.25*markovProb.P + 0.20*short.P + 0.15*pattern.P + 0.10*totalAI.P,
    T:0.30*full.T + 0.25*markovProb.T + 0.20*short.T + 0.15*pattern.T + 0.10*totalAI.T
};

// normalize
let sumF=final.B+final.P+final.T;
final.B/=sumF;
final.P/=sumF;
final.T/=sumF;

// ===== RESULT =====
let result="🔴 CÁI";
let max=final.B;

if(final.P>max){result="🔵 CON";max=final.P;}
if(final.T>max){result="🟡 HÒA";}

// ===== UI =====
function bar(p,c){
    return `<div class="bar" style="width:${p}%;background:${c}"></div>`;
}

resultDiv.innerHTML=`
🔥 <b>AI PHÂN TÍCH CHUỖI</b><br><br>

📊 FULL: ${(full.B*100).toFixed(1)} / ${(full.P*100).toFixed(1)} / ${(full.T*100).toFixed(1)}<br>
🔗 MARKOV (sau ${last}): ${(markovProb.B*100).toFixed(1)} / ${(markovProb.P*100).toFixed(1)} / ${(markovProb.T*100).toFixed(1)}<br>
⚡ SHORT: ${(short.B*100).toFixed(1)} / ${(short.P*100).toFixed(1)} / ${(short.T*100).toFixed(1)}<br>

<br>🎯 FINAL<br>

🔴 ${(final.B*100).toFixed(2)}%
${bar(final.B*100,'#e53935')}

🔵 ${(final.P*100).toFixed(2)}%
${bar(final.P*100,'#2196f3')}

🟡 ${(final.T*100).toFixed(2)}%
${bar(final.T*100,'#fbc02d')}

<br>📈 Streak: ${streak}
<br><br>👉 <b>${result}</b>
`;

}

</script>

</body>
</html>
