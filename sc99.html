<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 6.0 Quant Model</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}
.container{
    width:95%;
    max-width:1100px;
    margin:auto;
    padding:20px;
}
input{
    padding:6px;
    margin:4px;
    border-radius:6px;
    border:none;
}
button{
    padding:10px 20px;
    background:#00ffcc;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
table{
    margin:auto;
    border-collapse:collapse;
}
td{
    width:40px;
    height:30px;
    font-size:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>⚽ AI 6.0 Quant Football Analytics</h1>

<h3>Đội Nhà</h3>
<input type="number" step="0.1" id="homeGoals" placeholder="Avg Goals">
<input type="number" step="0.1" id="homeConcede" placeholder="Avg Concede">
<input type="number" id="homeElo" placeholder="Elo">

<h3>Đội Khách</h3>
<input type="number" step="0.1" id="awayGoals" placeholder="Avg Goals">
<input type="number" step="0.1" id="awayConcede" placeholder="Avg Concede">
<input type="number" id="awayElo" placeholder="Elo">

<h3>Kèo Chấp (nhập ví dụ: -0.5 | +0.75)</h3>
<input type="number" step="0.25" id="handicap">

<br><br>
<button onclick="runAI()">Run AI 100.000 Simulation</button>

<h2>Kết quả</h2>
<div id="result"></div>

<h2>Heatmap xác suất tỷ số (0-5)</h2>
<div id="heatmap"></div>

</div>

<script>

function poisson(lambda){
    let L=Math.exp(-lambda);
    let k=0,p=1;
    do{
        k++;
        p*=Math.random();
    }while(p>L);
    return k-1;
}

function poissonProb(lambda,x){
    function fact(n){return n<=1?1:n*fact(n-1);}
    return (Math.pow(lambda,x)*Math.exp(-lambda))/fact(x);
}

// xử lý kèo châu Á chuẩn
function asianHandicapResult(goalDiff, handicap){

    let adjusted = goalDiff + handicap;

    if(handicap % 1 === 0){
        if(adjusted>0) return 1;
        if(adjusted===0) return 0;
        return -1;
    }

    if(Math.abs(handicap % 1)===0.5){
        return adjusted>0?1:-1;
    }

    if(Math.abs(handicap % 1)===0.25){
        let half1 = handicap - 0.25;
        let half2 = handicap + 0.25;
        return (
            asianHandicapResult(goalDiff,half1)+
            asianHandicapResult(goalDiff,half2)
        )/2;
    }

    if(Math.abs(handicap % 1)===0.75){
        let half1 = handicap - 0.25;
        let half2 = handicap + 0.25;
        return (
            asianHandicapResult(goalDiff,half1)+
            asianHandicapResult(goalDiff,half2)
        )/2;
    }

    return 0;
}

function runAI(){

let hg=parseFloat(homeGoals.value)||1.5;
let hc=parseFloat(homeConcede.value)||1.2;
let he=parseInt(homeElo.value)||1700;

let ag=parseFloat(awayGoals.value)||1.3;
let ac=parseFloat(awayConcede.value)||1.3;
let ae=parseInt(awayElo.value)||1680;

let handicap=parseFloat(document.getElementById("handicap").value)||0;

let leagueAvg=1.35;
let homeAdvantage=80;

let expected=1/(1+Math.pow(10,(ae-(he+homeAdvantage))/400));

let attackHome=hg/leagueAvg;
let defenseAway=ac/leagueAvg;
let attackAway=ag/leagueAvg;
let defenseHome=hc/leagueAvg;

let lambdaHome=attackHome*defenseAway*leagueAvg*(0.55+expected*0.45)*0.95;
let lambdaAway=attackAway*defenseHome*leagueAvg*(0.55+(1-expected)*0.45)*0.95;

let sims=100000;

let hWin=0,draw=0,aWin=0;
let coverScore=0;

for(let i=0;i<sims;i++){

    let h=poisson(lambdaHome);
    let a=poisson(lambdaAway);

    if(h>a) hWin++;
    else if(h===a) draw++;
    else aWin++;

    let goalDiff=h-a;

    coverScore+=asianHandicapResult(goalDiff,handicap);
}

let homeP=hWin/sims*100;
let drawP=draw/sims*100;
let awayP=aWin/sims*100;

let coverP=(coverScore/sims+1)/2*100;

let modelEdge=Math.abs(lambdaHome-lambdaAway)*18;
let eloEdge=Math.abs(he-ae)/40;
let confidence=Math.min(95,(modelEdge+eloEdge));

document.getElementById("result").innerHTML=`
🏠 Home Win: ${homeP.toFixed(1)}%<br>
🤝 Draw: ${drawP.toFixed(1)}%<br>
✈️ Away Win: ${awayP.toFixed(1)}%<br><br>
📈 Xác suất vượt kèo (${handicap}): ${coverP.toFixed(1)}%<br>
🔥 Confidence Engine: ${confidence.toFixed(1)} / 100<br>
📊 xG Home: ${lambdaHome.toFixed(2)}<br>
📊 xG Away: ${lambdaAway.toFixed(2)}
`;

let table="<table border='1'>";
for(let i=0;i<=5;i++){
    table+="<tr>";
    for(let j=0;j<=5;j++){
        let p=poissonProb(lambdaHome,i)*poissonProb(lambdaAway,j);
        let c=Math.min(255,Math.floor(p*3000));
        table+=`<td style="background:rgb(${c},0,0)">${(p*100).toFixed(1)}</td>`;
    }
    table+="</tr>";
}
table+="</table>";

document.getElementById("heatmap").innerHTML=table;

}

</script>

</body>
</html>
