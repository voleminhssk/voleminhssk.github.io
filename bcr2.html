<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pattern Analyzer</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.result{
    margin-top:20px;
    padding:20px;
    border-radius:10px;
    background:#111827;
}

.success{
    color:#22c55e;
    font-weight:bold;
}

.warning{
    color:#f59e0b;
    font-weight:bold;
}

.big{
    font-size:40px;
    font-weight:bold;
    margin:10px 0;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

td,th{
    border:1px solid #374151;
    padding:8px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Pattern Analyzer</h1>

<input
id="pattern"
placeholder="Nhập chuỗi B/P/T (tối thiểu 7 ký tự)"
>

<button onclick="analyze()">
PHÂN TÍCH
</button>

<div id="result" class="result">
Nhập chuỗi và bấm phân tích.
</div>

</div>

</div>

<script>

const DATABASE = `
ppppbbbpppbtbppbbttbbbbtbbbbbbbpptppbbpbbbpbbbpbbbppp
pbbpbbbbppppppbtbbppbtpppbbpppbbpbbbbbbpbpppppbbbb
pppppppbbbpbppbptppbptpbpbbbpbptbbpttpppppbb
bbpppbpbbbbppppppbpbtppbpbpbbtbbpbppp
btbppbbttbbbbtbbbbbbbpptppbbpbbbpbbbpbbbppppbppbbbpbtppp
btbptpbtbppbppbbtbbbbpbtpbppppbpbbppppb
pbbpbpbpppbpbtppppp
pbppbbbbbbbpbppbbpbbpppbbbt
bpppptptpbpbbtbtbbpbbbtbpppbppbp
`
.replace(/\s/g,"")
.toLowerCase();

function similarity(a,b){

    let score = 0;

    for(let i=0;i<a.length;i++){
        if(a[i]===b[i]) score++;
    }

    return score / a.length;
}

function analyze(){

    let pattern =
    document
    .getElementById("pattern")
    .value
    .toLowerCase()
    .replace(/[^bpt]/g,"");

    if(pattern.length < 7){
        alert("Nhập tối thiểu 7 ký tự");
        return;
    }

    let found = false;

    for(let len=pattern.length;len>=7;len--){

        let search = pattern.slice(-len);

        let nextChars = [];

        for(let i=0;i<DATABASE.length-len;i++){

            let sub =
            DATABASE.substring(
                i,
                i+len
            );

            if(sub===search){

                let next =
                DATABASE[i+len];

                if(next){
                    nextChars.push(next);
                }
            }
        }

        if(nextChars.length){

            found = true;

            let b =
            nextChars.filter(x=>x==="b").length;

            let p =
            nextChars.filter(x=>x==="p").length;

            let t =
            nextChars.filter(x=>x==="t").length;

            let result="B";
            let max=b;

            if(p>max){
                max=p;
                result="P";
            }

            if(t>max){
                max=t;
                result="T";
            }

            let confidence =
            (
                max /
                nextChars.length *
                100
            ).toFixed(1);

            document
            .getElementById("result")
            .innerHTML = `
            <div class="success">
            TRÙNG CHUỖI
            </div>

            <div class="big">${result}</div>

            <b>Chuỗi khớp:</b> ${search}<br>
            <b>Độ dài:</b> ${len}<br>
            <b>Số lần xuất hiện:</b> ${nextChars.length}<br>
            <b>Tỷ lệ ký tự phổ biến nhất:</b> ${confidence}%<br>

            <table>
            <tr>
            <th>B</th>
            <th>P</th>
            <th>T</th>
            </tr>
            <tr>
            <td>${b}</td>
            <td>${p}</td>
            <td>${t}</td>
            </tr>
            </table>

            <br>

            <b>Các ký tự theo sau mẫu:</b><br>
            ${nextChars.join(" ")}
            `;

            return;
        }
    }

    aiAnalysis(pattern);
}

function aiAnalysis(pattern){

    let candidates = [];

    for(
        let i=0;
        i<DATABASE.length-pattern.length;
        i++
    ){

        let sample =
        DATABASE.substring(
            i,
            i+pattern.length
        );

        let next =
        DATABASE[
            i+pattern.length
        ];

        if(!next) continue;

        let sim =
        similarity(
            pattern,
            sample
        );

        candidates.push({
            sample,
            next,
            sim
        });
    }

    candidates.sort(
        (a,b)=>
        b.sim-a.sim
    );

    candidates =
    candidates.slice(0,20);

    let scoreB=0;
    let scoreP=0;
    let scoreT=0;

    candidates.forEach(item=>{

        if(item.next==="b")
            scoreB += item.sim;

        if(item.next==="p")
            scoreP += item.sim;

        if(item.next==="t")
            scoreT += item.sim;
    });

    let total =
    scoreB +
    scoreP +
    scoreT;

    if(total===0){
        total=1;
    }

    let pb =
    (
        scoreB/total*100
    ).toFixed(1);

    let pp =
    (
        scoreP/total*100
    ).toFixed(1);

    let pt =
    (
        scoreT/total*100
    ).toFixed(1);

    let rows="";

    candidates.forEach(item=>{

        rows += `
        <tr>
        <td>${item.sample}</td>
        <td>${(item.sim*100).toFixed(1)}%</td>
        <td>${item.next.toUpperCase()}</td>
        </tr>
        `;
    });

    document
    .getElementById("result")
    .innerHTML = `

    <div class="warning">
    KHÔNG TÌM THẤY CHUỖI TRÙNG
    </div>

    <br>

    Đã thực hiện phân tích các mẫu tương đồng nhất trong dữ liệu.

    <table>
    <tr>
    <th>Ký tự</th>
    <th>Tỷ lệ</th>
    </tr>
    <tr>
    <td>B</td>
    <td>${pb}%</td>
    </tr>
    <tr>
    <td>P</td>
    <td>${pp}%</td>
    </tr>
    <tr>
    <td>T</td>
    <td>${pt}%</td>
    </tr>
    </table>

    <br>

    <b>20 mẫu tương đồng nhất</b>

    <table>
    <tr>
    <th>Mẫu</th>
    <th>Độ giống</th>
    <th>Ký tự sau</th>
    </tr>
    ${rows}
    </table>
    `;
}

</script>

</body>
</html>
